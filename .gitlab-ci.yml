image: maven:3.9.5-eclipse-temurin-21

variables:
	MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
	MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
	POSTGRES_DB: testdb
	POSTGRES_USER: test
	POSTGRES_PASSWORD: test
	POSTGRES_HOST_AUTH_METHOD: trust

cache:
	paths:
		- .m2/repository/
		- target/

stages:
	- validate
	- test
	- build
	- security-scan
	- package
	- deploy

before_script:
	- java -version
	- mvn -version

# Validate dependencies and check for vulnerabilities
validate-dependencies:
	stage: validate
	script:
		- mvn $MAVEN_CLI_OPTS dependency:analyze
		- mvn $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check
	artifacts:
		when: always
		reports:
			junit:
				- target/dependency-check-report.xml
		paths:
			- target/dependency-check-report.html
	allow_failure: true

# Unit Tests
unit-tests:
	stage: test
	script:
		- mvn $MAVEN_CLI_OPTS clean compile test
	artifacts:
		when: always
		reports:
			junit:
				- target/surefire-reports/TEST-*.xml
			coverage_report:
				coverage_format: jacoco
				path: target/site/jacoco/jacoco.xml
		paths:
			- target/site/jacoco/
	coverage: '/Total.*?([0-9]{1,3})%/'

# Integration Tests
integration-tests:
	stage: test
	services:
		- postgres:16-alpine
	variables:
		SPRING_PROFILES_ACTIVE: test
		SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
		SPRING_DATASOURCE_USERNAME: test
		SPRING_DATASOURCE_PASSWORD: test
	script:
		- mvn $MAVEN_CLI_OPTS clean compile test-compile failsafe:integration-test failsafe:verify
	artifacts:
		when: always
		reports:
			junit:
				- target/failsafe-reports/TEST-*.xml
		paths:
			- target/failsafe-reports/
	dependencies:
		- unit-tests

# Contract Tests
contract-tests:
	stage: test
	script:
		- mvn $MAVEN_CLI_OPTS spring-cloud-contract:generateTests
		- mvn $MAVEN_CLI_OPTS spring-cloud-contract:generateStubs
		- mvn $MAVEN_CLI_OPTS test -Dtest="*ContractTest"
	artifacts:
		when: always
		reports:
			junit:
				- target/surefire-reports/TEST-*ContractTest.xml
		paths:
			- target/stubs/
	dependencies:
		- unit-tests

# Build Application
build-application:
	stage: build
	script:
		- mvn $MAVEN_CLI_OPTS clean compile
		- mvn $MAVEN_CLI_OPTS openapi-generator:generate
	artifacts:
		paths:
			- target/classes/
			- target/generated-sources/
	dependencies:
		- unit-tests
		- integration-tests

# Security Scanning
security-scan:
	stage: security-scan
	script:
		- mvn $MAVEN_CLI_OPTS com.github.spotbugs:spotbugs-maven-plugin:check
	artifacts:
		when: always
		paths:
			- target/spotbugsXml.xml
			- target/spotbugs.html
	allow_failure: true
	dependencies:
		- build-application

# Package Application
package-application:
	stage: package
	script:
		- mvn $MAVEN_CLI_OPTS clean package -DskipTests
	artifacts:
		paths:
			- target/*.jar
		expire_in: 1 week
	dependencies:
		- build-application

# Build Docker Image
build-docker:
	stage: package
	image: docker:24.0.5
	services:
		- docker:24.0.5-dind
	variables:
		DOCKER_TLS_CERTDIR: "/certs"
	before_script:
		- docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
	script:
		- docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
		- docker build -t $CI_REGISTRY_IMAGE:latest .
		- docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
		- docker push $CI_REGISTRY_IMAGE:latest
	dependencies:
		- package-application
	only:
		- main
		- develop

# Deploy to Development
deploy-dev:
	stage: deploy
	environment:
		name: development
		url: https://cart-microservice-dev.example.com
	script:
		- echo "Deploying to development environment"
		# Add your deployment commands here
		# kubectl apply -f k8s/dev/
	dependencies:
		- build-docker
	only:
		- develop
	when: manual

# Deploy to Production
deploy-prod:
	stage: deploy
	environment:
		name: production
		url: https://cart-microservice.example.com
	script:
		- echo "Deploying to production environment"
		# Add your deployment commands here
		# kubectl apply -f k8s/prod/
	dependencies:
		- build-docker
	only:
		- main
	when: manual

# Performance Tests (optional)
performance-tests:
	stage: test
	image: alpine:latest
	before_script:
		- apk add --no-cache curl
	script:
		- echo "Running performance tests"
		# Add performance testing commands here
		# artillery run performance-tests.yml
	allow_failure: true
	only:
		- main
		- develop
	when: manual

# Code Quality Gates
code-quality:
	stage: validate
	script:
		- mvn $MAVEN_CLI_OPTS clean compile
		- mvn $MAVEN_CLI_OPTS jacoco:prepare-agent test jacoco:report
		- mvn $MAVEN_CLI_OPTS com.github.spotbugs:spotbugs-maven-plugin:spotbugs
	artifacts:
		reports:
			coverage_report:
				coverage_format: jacoco
				path: target/site/jacoco/jacoco.xml
		paths:
			- target/site/jacoco/
			- target/spotbugsXml.xml
	coverage: '/Total.*?([0-9]{1,3})%/'